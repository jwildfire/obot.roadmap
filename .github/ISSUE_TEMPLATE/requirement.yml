name: Requirement
description: A roadmap requirement linked to implementation tasks in other repos.
title: "{title}"
labels:
  - requirement
body:
  - type: markdown
    attributes:
      value: |
       This is a [Requirement](../../README.md#requirements) issue for the obot portfolio. Business Requirement and Overview are required for initialization.

  - type: textarea
    id: business_requirement
    attributes:
      label: Business Requirement
      description: "What business need does this address? Who benefits, and what does success look like?"
      placeholder: |
        State the user-facing or operational need in plain language.
        Avoid technical detail — capture the *why*, not the *how*.
    validations:
      required: true

  - type: textarea
    id: overview
    attributes:
      label: Overview
      description: "Short technical summary + impact. Must be populated when the issue is created."
      placeholder: |
        Briefly describe the proposed approach and which packages /
        repos / users it affects. Detailed design lives in the Design
        section, populated during Step 3 of the lifecycle.
    validations:
      required: true

  - type: textarea
    id: data_requirement
    attributes:
      label: Data Requirement
      description: |
        What source data must exist for this requirement to be feasible?
        List domains, tables, columns, or data sources required.
        Can be left blank at creation; must be populated during
        Requirement Gathering (Step 2).
      placeholder: |
        **Required domains / tables:**

        **Required columns:**

        **Data source / system:**

        **Availability status:** Confirmed / Unconfirmed / TBD

  - type: textarea
    id: design
    attributes:
      label: Design
      description: |
        Detailed description including high-level technical components and
        affected packages. Can be left blank at creation. Must be populated
        before Tasks are created. For complex requirements, add artifacts
        under `requirements/design/{issue_number}_design.md` and link here.
      placeholder: |
        **Summary:**

        **Affected packages / repos:**

        **Design artifacts:** requirements/design/{issue_number}_design.md

  - type: textarea
    id: tasks
    attributes:
      label: Tasks
      description: |
        List of tasks that must be completed. Each task should be linked to
        an issue in the appropriate repo. Must be populated before
        implementation begins.
      placeholder: |
        - [ ] Task description — repo — #issue
